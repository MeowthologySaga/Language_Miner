<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://www.youtube.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' data: blob: lem-video:; font-src 'self' data:; connect-src 'self' https://generativelanguage.googleapis.com https://translation.googleapis.com http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; frame-src 'self' lem-playzone: file: https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>Language Miner</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f4f7fb;
      }

      .startup-paint {
        position: fixed;
        z-index: 10000;
        inset: 0;
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
        background: #f4f7fb;
        color: #1769e0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .startup-paint-inner {
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .startup-paint-mark {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 12px;
        background: #1769e0;
        box-shadow: 0 10px 26px rgb(23 105 224 / 22%);
        color: #ffffff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .startup-paint-progress {
        display: flex;
        gap: 6px;
      }

      .startup-paint-progress span {
        width: 22px;
        height: 4px;
        border-radius: 999px;
        background: #c7daf8;
        animation: startup-pulse 1.1s ease-in-out infinite alternate;
      }

      .startup-paint-progress span:nth-child(2) {
        animation-delay: 140ms;
      }

      .startup-paint-progress span:nth-child(3) {
        animation-delay: 280ms;
      }

      @keyframes startup-pulse {
        to {
          background: #1769e0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-paint-progress span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-paint" class="startup-paint" aria-hidden="true">
      <div class="startup-paint-inner">
        <div class="startup-paint-mark" aria-hidden="true">LM</div>
        <div class="startup-paint-progress" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

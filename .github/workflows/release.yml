name: Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify Windows x64 release payload
    if: github.repository == 'MeowthologySaga/Language_Miner' && github.event.repository.visibility == 'public'
    permissions:
      contents: read
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CI: "true"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      LEM_BUILD_CANARY: "LEM-CANARY-${{ github.run_id }}-${{ github.sha }}"
      RELEASE_REPOSITORY: ${{ github.repository }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release ref
        shell: pwsh
        run: |
          if ($env:RELEASE_REPOSITORY -ne "MeowthologySaga/Language_Miner") {
            throw "Release workflow is restricted to the official public repository."
          }
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Release tag has an unsupported format."
          }

      - name: Refuse to overwrite an existing published release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $response = & gh api --method GET `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2026-03-10" `
            "repos/$env:RELEASE_REPOSITORY/releases/tags/$env:RELEASE_TAG" 2>&1
          $status = $LASTEXITCODE
          $responseText = $response | Out-String
          if ($status -eq 0) {
            $existingRelease = $responseText | ConvertFrom-Json
            if (-not $existingRelease.draft) {
              $kind = if ($existingRelease.immutable) { "immutable" } else { "published" }
              throw "Refusing to modify the already-published $kind release $env:RELEASE_TAG. Publish a new version tag instead."
            }
            Write-Host "A draft release already exists and may be safely resumed after its assets are verified."
          } elseif ($responseText -match "HTTP 404") {
            Write-Host "No existing release was found for $env:RELEASE_TAG."
          } else {
            throw "Could not determine whether the release already exists; failing closed. GitHub CLI response: $responseText"
          }

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          package-manager-cache: false

      - name: Install locked dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: npm run release:verify-tag -- "$env:RELEASE_TAG"

      - name: Block client-exposed secrets
        run: npm run guard:client-secrets

      - name: Verify the client-secret guard rejects a canary key
        run: npm run guard:client-secrets:self-test

      - name: Verify beta release configuration
        run: npm run release:verify-config

      - name: Verify and hydrate official games from their own locked releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run games:hydrate-official

      - name: Type-check Electron and renderer
        run: npm run typecheck

      - name: Run test suite
        run: npm test

      - name: Build application
        run: npm run build

      - name: Reject high-severity dependency advisories
        run: npm audit --audit-level=high

      - name: Audit public source tree
        run: npm run audit:public

      - name: Prove the selected public tree is promotable
        run: npm run release:stage-public

      - name: Audit the complete public Git history
        run: npm run audit:history

      - name: Generate release SBOM and license report
        run: node scripts/release/generate-compliance.cjs artifacts/release

      - name: Build synthetic beta.0 baseline installer for upgrade QA
        run: .\node_modules\.bin\electron-builder.cmd --win nsis --x64 --publish never --config.directories.output=release-baseline --config.extraMetadata.version=0.1.0-beta.0

      - name: Build unsigned NSIS installer
        run: .\node_modules\.bin\electron-builder.cmd --win nsis --x64 --publish never

      - name: Build unsigned portable executable
        run: .\node_modules\.bin\electron-builder.cmd --win portable --x64 --publish never

      - name: Smoke test clean install, synthetic upgrade, repair, uninstall, and portable execution
        shell: pwsh
        run: .\scripts\release\smoke-windows-artifacts.ps1 -BaselineReleaseDirectory release-baseline -BaselineVersion 0.1.0-beta.0 -OfficialGames

      - name: Collect Windows executables
        run: npm run release:collect

      - name: Package manual-install browser extension
        run: npm run extension:package

      - name: Stage the already-verified official games for the central release
        run: npm run games:hydrate-official -- --offline --publish-to-release

      - name: Expand installer, portable, and ASAR payloads for canary scanning
        shell: pwsh
        run: .\scripts\release\extract-release-for-scan.ps1

      - name: Prove the artifact scanner detects the build canary
        shell: pwsh
        run: |
          $probe = "artifacts/canary-probe/should-fail.txt"
          try {
            New-Item -ItemType Directory -Path (Split-Path -Parent $probe) -Force | Out-Null
            Set-Content -LiteralPath $probe -Value $env:LEM_BUILD_CANARY -NoNewline
            $scanOutput = npm run audit:artifacts -- artifacts/canary-probe 2>&1
            $scanStatus = $LASTEXITCODE
            $scanOutput | Write-Output
            if ($scanStatus -eq 0) {
              throw "Artifact scanner failed to detect the canary probe."
            }
            if (-not (($scanOutput | Out-String).Contains("[build-canary]"))) {
              throw "Artifact scanner failed without proving that it detected the build canary."
            }
          } finally {
            Remove-Item -LiteralPath $probe -Force -ErrorAction SilentlyContinue
          }

      - name: Scan JS, source maps, ASAR, executables, expanded payloads, and release artifacts
        run: npm run audit:artifacts -- dist dist-electron release cartridges artifacts/release artifacts/release-secret-scan artifacts/windows-smoke

      - name: Create complete source archives
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $publicSource = (Resolve-Path -LiteralPath "artifacts/public-source").Path
          tar.exe -a -c -f "artifacts/release/Language-Miner-$version-source.zip" -C $publicSource .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          tar.exe -czf "artifacts/release/Language-Miner-$version-source.tar.gz" -C $publicSource .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Write release notes and SHA-256 checksums
        run: |
          npm run release:notes
          npm run release:checksums

      - name: Write immutable build metadata
        shell: pwsh
        run: |
          $commitSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($commitSha -notmatch '^[0-9a-f]{40}$') {
            throw "The checked-out commit is not a full Git SHA."
          }
          if ($commitSha -ne $env:GITHUB_SHA.ToLowerInvariant()) {
            throw "The checked-out commit does not match the workflow commit."
          }
          $metadata = [ordered]@{
            schemaVersion = 1
            repository = $env:RELEASE_REPOSITORY
            tag = $env:RELEASE_TAG
            commitSha = $commitSha
            runId = $env:GITHUB_RUN_ID
          }
          $metadata | ConvertTo-Json | Set-Content -LiteralPath "artifacts/release-build-metadata.json" -Encoding utf8

      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: language-miner-${{ github.ref_name }}-windows-x64
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          path: |
            artifacts/release/**
            artifacts/release-notes.md
            artifacts/release-build-metadata.json
            artifacts/public-source/PUBLIC_TREE_MANIFEST.json
            artifacts/windows-smoke/*-report.json
            artifacts/windows-smoke/*-report*.png

  attest:
    name: Attest immutable workflow artifact
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Download immutable workflow artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: language-miner-${{ github.ref_name }}-windows-x64
          path: artifacts

      - name: Verify checksums before attestation
        shell: pwsh
        run: |
          $releaseDirectory = (Resolve-Path -LiteralPath "artifacts/release").Path
          $checksumPath = Join-Path $releaseDirectory "SHA256SUMS.txt"
          if (-not (Test-Path -LiteralPath $checksumPath -PathType Leaf)) {
            throw "SHA256SUMS.txt is missing from the release payload."
          }
          $expectedNames = @{}
          foreach ($line in Get-Content -LiteralPath $checksumPath) {
            if ($line -notmatch '^([0-9a-fA-F]{64}) \*(.+)$') {
              throw "SHA256SUMS.txt contains an invalid line."
            }
            $name = $Matches[2]
            if ($name -match '[/\\]' -or $name -in @('.', '..') -or $expectedNames.ContainsKey($name)) {
              throw "SHA256SUMS.txt contains an unsafe or duplicate file name."
            }
            $filePath = Join-Path $releaseDirectory $name
            if (-not (Test-Path -LiteralPath $filePath -PathType Leaf)) {
              throw "SHA256SUMS.txt names a missing release file."
            }
            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $filePath).Hash.ToLowerInvariant()
            if ($actual -ne $Matches[1].ToLowerInvariant()) {
              throw "A release file does not match SHA256SUMS.txt."
            }
            $expectedNames[$name] = $true
          }
          $actualNames = @(Get-ChildItem -LiteralPath $releaseDirectory -File | Where-Object Name -ne "SHA256SUMS.txt" | ForEach-Object Name)
          if ($expectedNames.Count -ne $actualNames.Count) {
            throw "SHA256SUMS.txt does not cover the complete release payload."
          }
          foreach ($name in $actualNames) {
            if (-not $expectedNames.ContainsKey($name)) {
              throw "SHA256SUMS.txt does not cover the complete release payload."
            }
          }

      - name: Generate build provenance for every release file
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: artifacts/release/*

  draft:
    name: Create verified draft release
    needs:
      - build
      - attest
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      RELEASE_REPOSITORY: ${{ github.repository }}
      RELEASE_TAG: ${{ github.ref_name }}
      EXPECTED_WORKFLOW_SHA: ${{ github.sha }}
    steps:
      - name: Download immutable workflow artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: language-miner-${{ github.ref_name }}-windows-x64
          path: artifacts

      - name: Create or refresh verified draft only
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Invoke-GitHubJson {
            param([Parameter(Mandatory = $true)][string]$Endpoint)
            $json = & gh api --method GET `
              -H "Accept: application/vnd.github+json" `
              -H "X-GitHub-Api-Version: 2026-03-10" `
              $Endpoint
            if ($LASTEXITCODE -ne 0) {
              throw "A required GitHub API verification failed."
            }
            return ($json | ConvertFrom-Json)
          }

          function Get-RemoteTagCommit {
            $tagRef = Invoke-GitHubJson "repos/$env:RELEASE_REPOSITORY/git/ref/tags/$env:RELEASE_TAG"
            $objectType = [string]$tagRef.object.type
            $objectSha = ([string]$tagRef.object.sha).ToLowerInvariant()
            $visited = @{}
            for ($depth = 0; $depth -lt 8; $depth++) {
              if ($objectType -eq "commit") {
                if ($objectSha -notmatch '^[0-9a-f]{40}$') {
                  throw "The remote tag does not resolve to a full commit SHA."
                }
                return $objectSha
              }
              if ($objectType -ne "tag" -or $objectSha -notmatch '^[0-9a-f]{40}$' -or $visited.ContainsKey($objectSha)) {
                throw "The remote release tag has an unsupported or cyclic object chain."
              }
              $visited[$objectSha] = $true
              $tagObject = Invoke-GitHubJson "repos/$env:RELEASE_REPOSITORY/git/tags/$objectSha"
              $objectType = [string]$tagObject.object.type
              $objectSha = ([string]$tagObject.object.sha).ToLowerInvariant()
            }
            throw "The remote release tag has too many annotation levels."
          }

          if ($env:RELEASE_REPOSITORY -ne "MeowthologySaga/Language_Miner" -or `
              $env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$' -or `
              $env:EXPECTED_WORKFLOW_SHA -notmatch '^[0-9a-fA-F]{40}$') {
            throw "The release identity is invalid."
          }
          $metadata = Get-Content -Raw -LiteralPath "artifacts/release-build-metadata.json" | ConvertFrom-Json
          if ($metadata.schemaVersion -ne 1 -or `
              $metadata.repository -cne $env:RELEASE_REPOSITORY -or `
              $metadata.tag -cne $env:RELEASE_TAG -or `
              ([string]$metadata.commitSha).ToLowerInvariant() -ne $env:EXPECTED_WORKFLOW_SHA.ToLowerInvariant()) {
            throw "The downloaded build metadata does not match this release workflow."
          }
          $expectedCommit = ([string]$metadata.commitSha).ToLowerInvariant()
          if ((Get-RemoteTagCommit) -ne $expectedCommit) {
            throw "The remote release tag no longer points to the attested build commit."
          }

          $releaseEndpoint = "repos/$env:RELEASE_REPOSITORY/releases/tags/$env:RELEASE_TAG"
          $response = & gh api --method GET `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2026-03-10" `
            $releaseEndpoint 2>&1
          $status = $LASTEXITCODE
          $responseText = $response | Out-String
          if ($status -eq 0) {
            $draftRelease = $responseText | ConvertFrom-Json
            if (-not $draftRelease.draft) {
              throw "Refusing to modify an already-published release. Publish a new version tag instead."
            }
            & gh release edit $env:RELEASE_TAG `
              --repo $env:RELEASE_REPOSITORY `
              --title "Language Miner $env:RELEASE_TAG" `
              --notes-file "artifacts/release-notes.md"
            if ($LASTEXITCODE -ne 0) { throw "Could not refresh the draft release notes." }
          } elseif ($responseText -match "HTTP 404") {
            & gh release create $env:RELEASE_TAG `
              --repo $env:RELEASE_REPOSITORY `
              --verify-tag `
              --draft `
              --title "Language Miner $env:RELEASE_TAG" `
              --notes-file "artifacts/release-notes.md"
            if ($LASTEXITCODE -ne 0) { throw "Could not create the draft release." }
          } else {
            throw "Could not determine whether the draft release exists; failing closed."
          }

          $draftRelease = Invoke-GitHubJson $releaseEndpoint
          if (-not $draftRelease.draft) {
            throw "Refusing to upload to a release that is no longer a draft."
          }
          $localAssets = @(Get-ChildItem -LiteralPath "artifacts/release" -File)
          if ($localAssets.Count -eq 0) {
            throw "No local release assets were found."
          }
          $localByName = @{}
          foreach ($asset in $localAssets) {
            if ($localByName.ContainsKey($asset.Name)) {
              throw "The local release payload contains duplicate asset names."
            }
            $localByName[$asset.Name] = $asset
          }
          $remoteByName = @{}
          foreach ($remoteAsset in @($draftRelease.assets)) {
            if ($remoteByName.ContainsKey($remoteAsset.name) -or -not $localByName.ContainsKey($remoteAsset.name)) {
              throw "The reusable draft contains a duplicate or unexpected asset."
            }
            $localAsset = $localByName[$remoteAsset.name]
            $expectedDigest = "sha256:$((Get-FileHash -Algorithm SHA256 -LiteralPath $localAsset.FullName).Hash.ToLowerInvariant())"
            if ($remoteAsset.state -ne "uploaded" -or `
                [int64]$remoteAsset.size -ne [int64]$localAsset.Length -or `
                $remoteAsset.digest -ne $expectedDigest) {
              throw "An existing draft asset does not match the attested build. Nothing will be overwritten."
            }
            $remoteByName[$remoteAsset.name] = $remoteAsset
          }
          $missingAssets = @($localAssets | Where-Object { -not $remoteByName.ContainsKey($_.Name) })
          if ($missingAssets.Count -gt 0) {
            $uploadArguments = @("release", "upload", $env:RELEASE_TAG, "--repo", $env:RELEASE_REPOSITORY)
            $uploadArguments += @($missingAssets.FullName)
            & gh @uploadArguments
            if ($LASTEXITCODE -ne 0) { throw "Could not upload the missing draft assets." }
          }

          $verifiedDraft = Invoke-GitHubJson $releaseEndpoint
          if (-not $verifiedDraft.draft -or @($verifiedDraft.assets).Count -ne $localAssets.Count) {
            throw "The release stopped being a complete draft before verification finished."
          }
          foreach ($localAsset in $localAssets) {
            $matches = @($verifiedDraft.assets | Where-Object { $_.name -ceq $localAsset.Name })
            if ($matches.Count -ne 1) {
              throw "The draft is missing a unique expected asset."
            }
            $remoteAsset = $matches[0]
            $expectedDigest = "sha256:$((Get-FileHash -Algorithm SHA256 -LiteralPath $localAsset.FullName).Hash.ToLowerInvariant())"
            if ($remoteAsset.state -ne "uploaded" -or `
                [int64]$remoteAsset.size -ne [int64]$localAsset.Length -or `
                $remoteAsset.digest -ne $expectedDigest) {
              throw "A GitHub asset digest does not match the attested build."
            }
          }
          if ((Get-RemoteTagCommit) -ne $expectedCommit) {
            throw "The remote tag changed while the verified draft was being prepared."
          }
          "Verified draft created. Publication requires the local administrator-authenticated publisher script." | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

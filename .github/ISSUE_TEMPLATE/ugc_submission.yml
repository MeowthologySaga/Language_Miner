name: 기타 UGC 형식·등록 도움 / Other UGC help
description: 캐릭터 카드나 PlayZone 게임 양식에 맞지 않거나 등록 중 막힌 점을 질문합니다.
title: "[UGC 도움] "
labels:
  - ugc
body:
  - type: markdown
    attributes:
      value: |
        캐릭터 JSON은 **캐릭터 카드 공유**, `.lem`·`.lemgame`은 **PlayZone 게임 공유** 양식을 먼저 사용하세요. 이 양식은 다른 형식을 제안하거나 등록 중 막힌 점을 묻는 곳입니다.

        게시글은 공개됩니다. 파일을 직접 첨부하거나 API 키·토큰·개인정보·비공개 로그를 넣지 마세요.
  - type: dropdown
    id: help_type
    attributes:
      label: 무엇이 필요한가요? / What do you need?
      options:
        - 다른 호환 콘텐츠 형식 제안 / Propose another compatible format
        - 캐릭터 카드 등록 도움 / Help with a character-card submission
        - PlayZone 게임 등록 도움 / Help with a PlayZone submission
        - 라이선스·SHA-256·Release 도움 / Help with licenses, SHA-256, or Releases
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: 어디에서 막혔나요? / Where are you stuck?
      description: 화면에 보인 문구와 하려던 일을 적어 주세요. 비밀정보와 전체 로컬 경로는 지우세요.
    validations:
      required: true
  - type: input
    id: public_source
    attributes:
      label: 공개 소스 링크 (선택) / Public source link (optional)
      placeholder: https://github.com/creator/project
  - type: checkboxes
    id: checklist
    attributes:
      label: 공개 확인 / Public-post check
      options:
        - label: 이 게시글과 링크가 공개된다는 점을 이해합니다.
          required: true
        - label: API 키, 토큰, 개인정보, 로컬 경로와 비공개 로그를 제거했습니다.
          required: true

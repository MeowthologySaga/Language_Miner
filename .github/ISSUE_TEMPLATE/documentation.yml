name: Documentation or translation
description: Report unclear, incorrect, inaccessible, or mismatched Korean/English documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Page or file
      placeholder: docs/user-guide.en.md, section “First card”
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Type of problem
      options:
        - Incorrect instructions
        - Korean/English mismatch
        - Unclear wording
        - Accessibility
        - Broken link
        - Missing attribution
        - Other documentation issue
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: Suggested correction
      description: Explain what a reader needs and what should change.
    validations:
      required: true
  - type: checkboxes
    id: safe
    attributes:
      label: Privacy check
      options:
        - label: I did not include API keys, personal text, account details, or local file paths.
          required: true
